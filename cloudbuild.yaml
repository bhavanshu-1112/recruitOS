steps:
  # ── Build Backend Image ────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t', 'gcr.io/$PROJECT_ID/recruiter-os-backend:$COMMIT_SHA',
      '-t', 'gcr.io/$PROJECT_ID/recruiter-os-backend:latest',
      './backend'
    ]
    id: 'build-backend'

  # ── Build Frontend Image ───────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t', 'gcr.io/$PROJECT_ID/recruiter-os-frontend:$COMMIT_SHA',
      '-t', 'gcr.io/$PROJECT_ID/recruiter-os-frontend:latest',
      './frontend'
    ]
    id: 'build-frontend'

  # ── Push Backend Image ─────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/recruiter-os-backend:$COMMIT_SHA']
    id: 'push-backend'
    dependsOn: ['build-backend']

  # ── Push Frontend Image ────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/recruiter-os-frontend:$COMMIT_SHA']
    id: 'push-frontend'
    dependsOn: ['build-frontend']

  # ── Deploy Backend to Cloud Run ────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args: [
      'run', 'deploy', 'recruiter-os-backend',
      '--image', 'gcr.io/$PROJECT_ID/recruiter-os-backend:$COMMIT_SHA',
      '--region', 'us-central1',
      '--platform', 'managed',
      '--allow-unauthenticated',
      '--port', '8000',
      '--set-env-vars', 'NODE_ENV=production'
    ]
    id: 'deploy-backend'
    dependsOn: ['push-backend']

  # ── Deploy Frontend to Cloud Run ───────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args: [
      'run', 'deploy', 'recruiter-os-frontend',
      '--image', 'gcr.io/$PROJECT_ID/recruiter-os-frontend:$COMMIT_SHA',
      '--region', 'us-central1',
      '--platform', 'managed',
      '--allow-unauthenticated',
      '--port', '80'
    ]
    id: 'deploy-frontend'
    dependsOn: ['push-frontend']

images:
  - 'gcr.io/$PROJECT_ID/recruiter-os-backend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/recruiter-os-backend:latest'
  - 'gcr.io/$PROJECT_ID/recruiter-os-frontend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/recruiter-os-frontend:latest'

options:
  logging: CLOUD_LOGGING_ONLY
